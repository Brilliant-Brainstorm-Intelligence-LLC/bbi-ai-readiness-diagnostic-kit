name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve the project.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible example.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
  - type: checkboxes
    id: privacy
    attributes:
      label: Data-safety confirmation
      options:
        - label: I removed secrets, personal data, client data, and proprietary information.
          required: true
