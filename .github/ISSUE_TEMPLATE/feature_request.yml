name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or user need
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe the desired behavior, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or examples
  - type: textarea
    id: limitations
    attributes:
      label: Risks and limitations
